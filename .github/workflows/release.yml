# Build wheels for all supported platforms and publishes them to PyPI when a new tag is 
# pushed.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate tag format and version
        shell: bash
        run: |
          # Validate that the tag is in the correct format
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match the strict pattern v[0-9]+.[0-9]+.[0-9]+"
            exit 1
          fi
          TAG_VERSION="${TAG#v}"

          # Verify that the tag version matches the version in Cargo.toml
          CARGO_VERSION=$(sed -n '/^\[package\]/,/^\[/{/^[[:space:]]*version[[:space:]]*=/ { s/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/; p } }' Cargo.toml)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Tag $TAG matches Cargo.toml version $CARGO_VERSION."

          # Verify that the tag version matches the version in docs/conf.py
          DOCS_VERSION=$(sed -n "s/^release[[:space:]]*=[[:space:]]*['\"]\([^'\"]*\)['\"].*$/\1/p" docs/conf.py | head -n1)
          if [ "$TAG_VERSION" != "$DOCS_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match docs/conf.py version ($DOCS_VERSION)"
            exit 1
          fi
          echo "Tag $TAG matches docs/conf.py version $DOCS_VERSION."
  
  test:
    needs: preflight
    strategy:
      fail-fast: true
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync Python dev environment
        run: uv sync --locked --all-groups

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Clippy linter
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test --verbose

      - name: Run ruff check
        run: uv run ruff check python tests

      - name: Run ruff format check
        run: uv run ruff format --check python tests

      - name: Run pytest
        run: uv run pytest

      - name: Build Sphinx documentation
        run: cd docs && uv run make html

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: 3.14

      - name: Sync Python dev environment
        run: uv sync --locked --group dev

      - name: Scan Rust binaries for vulnerabilities
        run: cargo audit --json > cargo-audit.json || true

      - name: Render Rust audit findings
        id: render-cargo-audit
        run: uv run python scripts/render-cargo-audit.py cargo-audit.json cargo-audit.md

      - name: Append findings to workflow summary
        run: cat cargo-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Scan Rust binaries for licenses
        run: cargo deny --format json check licenses 2> cargo-deny.json || true

      - name: Render Rust license findings
        id: render-cargo-deny
        run: uv run python scripts/render-cargo-deny.py cargo-deny.json cargo-deny.md

      - name: Append license findings to workflow summary
        run: cat cargo-deny.md >> "$GITHUB_STEP_SUMMARY"

      - name: Export Python runtime dependencies
        run: |
          uv export
            --format requirements-txt
            --no-dev
            --no-emit-project
            --all-extras
            -o requirements-audit.txt

      - name: Scan Python dependencies for vulnerabilities
        run: |
          uv run pip-audit
            -r requirements-audit.txt
            --require-hashes
            --disable-pip
            --format=json
            -o pip-audit.json || true

      - name: Render Python audit findings
        id: render-pip-audit
        run: uv run python scripts/render-pip-audit.py pip-audit.json pip-audit.md

      - name: Append Python findings to workflow summary
        run: cat pip-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Scan Python dependencies for licenses
        shell: bash
        run: |
          PACKAGES=$(grep -oE '^[A-Za-z0-9][A-Za-z0-9._-]*' requirements-audit.txt | sort -u | xargs)
          uv run pip-licenses \
            --from=mixed \
            --packages "$PACKAGES" \
            --format=json > pip-licenses.json || true

      - name: Render Python license findings
        id: render-pip-licenses
        run: uv run python scripts/render-pip-licenses.py pip-licenses.json pip-licenses.md

      - name: Append Python license findings to workflow summary
        run: cat pip-licenses.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: |
            cargo-audit.json
            cargo-audit.md
            cargo-deny.json
            cargo-deny.md
            pip-audit.json
            pip-audit.md
            pip-licenses.json
            pip-licenses.md
          if-no-files-found: warn
      
      - name: Fail workflow if vulnerabilities found
        if: always()
        run: |
          bash scripts/handle-audit-findings.sh \
            "${{ steps.render-cargo-audit.outputs.has_findings }}" \
            "${{ steps.render-cargo-deny.outputs.has_findings }}" \
            "${{ steps.render-pip-audit.outputs.has_findings }}" \
            "${{ steps.render-pip-licenses.outputs.has_findings }}"

  linux:
    needs: [test, audit]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    needs: [test, audit]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    needs: [test, audit]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.platform.python_arch }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    needs: [test, audit]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    needs: [test, audit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release to PyPI
    runs-on: ubuntu-latest
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write

    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-path: 'wheels-*/*'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cat > release-notes.md <<'EOF'
          # Release $TAG

          ## Summary
          One or a few high-level sentences summarising the release. This should be a 
          concise overview of the changes, improvements, or fixes included in this 
          release.

          ## Changes
          ### Breaking changes
          * One-sentence descriptions without full stops

          ### Bug fixes
          * One-sentence descriptions without full stops

          ### New features
          * One-sentence descriptions without full stops

          ### Performance enhancements
          * One-sentence descriptions without full stops

          ### Security updates
          * One-sentence descriptions without full stops

          ### Refactoring and code quality improvements
          * One-sentence descriptions without full stops

          ### Documentation updates
          * One-sentence descriptions without full stops

          ### CI/CD improvements
          * One-sentence descriptions without full stops

          ### Issue resolutions
          * One-sentence descriptions without full stops

          ### Miscellaneous
          * One-sentence descriptions without full stops
          EOF

          ARTIFACTS=$(find . -type f \( -name '*.whl' -o -name '*.tar.gz' \) | sort | tr '\n' ' ')
          if [ -z "$ARTIFACTS" ]; then
            echo "::error::No release artifacts found to upload."
            exit 1
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --notes-file release-notes.md \
            $ARTIFACTS
